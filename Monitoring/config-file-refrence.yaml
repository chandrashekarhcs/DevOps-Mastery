sudo tee vi /opt/prometheus/prometheus.yml >/dev/null <<'EOF'
global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - '43.205.118.140:9093'

rule_files:

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node_exporter'
    static_configs:
      - targets: ['43.205.118.140:9100','43.204.29.26:9100']

  - job_name: 'alertmanager'
    static_configs:
      - targets: ['43.205.118.140:9093']
EOF


sudo tee vi /opt/prometheus/rules.yml >/dev/null <<'EOF'
groups:
 - name: test
   rules:
   - alert: InstanceDown
     expr: up == 0
     for: 1m
EOF
